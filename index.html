<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#8B1A1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>动态中国草药名录</title>
<style>
/* ========== RESET & BASE ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; overflow-x: hidden; }
body {
  font-family: 'Noto Serif SC', 'SimSun', 'STSong', 'Source Han Serif SC', serif;
  background: #F5F0E8;
  color: #3C2415;
  line-height: 1.7;
  min-height: 100vh;
  overflow-x: hidden;
  width: 100%;
}
a { color: #8B1A1A; text-decoration: none; }
a:hover { color: #C41E3A; }

/* ========== FONTS ========== */
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

/* ========== DECORATIVE BG ========== */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(139, 26, 26, 0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, rgba(47, 79, 47, 0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ========== HEADER ========== */
.header {
  background: linear-gradient(135deg, #3C2415 0%, #5C3A28 40%, #2F4F2F 100%);
  color: #F5F0E8;
  padding: 2rem 1.5rem 1.5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(60, 36, 21, 0.3);
}
.random-btn {
  display: inline-block;
  margin-top: 0.6rem;
  margin-left: 0.8rem;
  padding: 0.3rem 1rem;
  border: 1px solid rgba(212, 165, 116, 0.5);
  border-radius: 20px;
  background: rgba(212, 165, 116, 0.1);
  font-size: 0.85rem;
  font-family: inherit;
  color: #D4A574;
  cursor: pointer;
  transition: all 0.3s, transform 0.3s ease, opacity 0.3s ease;
  vertical-align: middle;
}
.random-btn:hover {
  background: rgba(212, 165, 116, 0.25);
  border-color: #D4A574;
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(212, 165, 116, 0.2);
}
.header::before {
  content: '● ● ●';
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  letter-spacing: 12px;
  font-size: 0.6rem;
  color: rgba(212, 165, 116, 0.3);
}
.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, #D4A574, transparent);
}
.header h1 {
  font-size: 2.2rem;
  font-weight: 900;
  letter-spacing: 6px;
  color: #F5F0E8;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  margin-bottom: 0.3rem;
}
.header .subtitle {
  font-size: 0.9rem;
  color: #D4A574;
  letter-spacing: 4px;
  font-weight: 400;
  opacity: 0.8;
}
.header .count-badge {
  display: inline-block;
  margin-top: 0.6rem;
  padding: 0.2rem 1rem;
  border: 1px solid rgba(212, 165, 116, 0.4);
  border-radius: 20px;
  font-size: 0.8rem;
  color: #D4A574;
  letter-spacing: 1px;
}

/* ========== SEARCH BAR ========== */
.search-section {
  background: #FFFCF7;
  border-bottom: 1px solid #E8DDD0;
  padding: 1rem 1.5rem;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(60, 36, 21, 0.08);
}
.search-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  gap: 1rem;
  align-items: center;
  flex-wrap: wrap;
}
.search-box {
  flex: 1 1 300px;
  position: relative;
}
.search-box input {
  width: 100%;
  padding: 0.7rem 1rem 0.7rem 2.5rem;
  border: 2px solid #E8DDD0;
  border-radius: 8px;
  font-size: 0.95rem;
  font-family: inherit;
  background: #FFFCF7;
  color: #3C2415;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.search-box input:focus {
  outline: none;
  border-color: #8B1A1A;
  box-shadow: 0 0 0 3px rgba(139, 26, 26, 0.1);
}
.search-box input::placeholder { color: #B8A89A; }
.search-box .icon {
  position: absolute;
  left: 0.8rem;
  top: 50%;
  transform: translateY(-50%);
  color: #B8A89A;
  font-size: 1rem;
}
.search-clear {
  position: absolute;
  right: 0.5rem;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: #B8A89A;
  cursor: pointer;
  font-size: 1.1rem;
  padding: 0.2rem;
  display: none;
}
.search-clear.visible { display: block; }
.search-clear:hover { color: #8B1A1A; }

/* ========== FILTERS ========== */
.filters {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  align-items: center;
}
.filter-group {
  display: flex;
  gap: 0.3rem;
  flex-wrap: wrap;
  align-items: center;
}
.filter-label {
  font-size: 0.78rem;
  color: #8B7355;
  letter-spacing: 1px;
  margin-right: 0.3rem;
}
.filter-btn {
  padding: 0.3rem 0.7rem;
  border: 1px solid #E8DDD0;
  border-radius: 16px;
  background: transparent;
  font-size: 0.78rem;
  font-family: inherit;
  color: #5C4A3A;
  cursor: pointer;
  transition: all 0.2s;
}
.filter-btn:hover {
  border-color: #D4A574;
  color: #8B1A1A;
  background: #FFF8F0;
}
.filter-btn.active {
  background: #8B1A1A;
  color: #FFFCF7;
  border-color: #8B1A1A;
}
.filter-btn.nature-cold.active { background: #4A7BB5; border-color: #4A7BB5; }
.filter-btn.nature-cold:hover { border-color: #4A7BB5; color: #4A7BB5; }
.filter-btn.nature-hot.active { background: #C41E3A; border-color: #C41E3A; }
.filter-btn.nature-hot:hover { border-color: #C41E3A; color: #C41E3A; }
.filter-btn.nature-warm.active { background: #D4875E; border-color: #D4875E; }
.filter-btn.nature-warm:hover { border-color: #D4875E; color: #D4875E; }
.filter-btn.nature-cool.active { background: #5E9B8A; border-color: #5E9B8A; }
.filter-btn.nature-cool:hover { border-color: #5E9B8A; color: #5E9B8A; }
.filter-btn.nature-neutral.active { background: #8B7355; border-color: #8B7355; }
.filter-btn.nature-neutral:hover { border-color: #8B7355; color: #8B7355; }
.reset-btn {
  padding: 0.3rem 0.8rem;
  border: 1px dashed #D4C5B0;
  border-radius: 16px;
  background: transparent;
  font-size: 0.75rem;
  font-family: inherit;
  color: #B8A89A;
  cursor: pointer;
  transition: all 0.2s;
}
.reset-btn:hover {
  border-color: #8B1A1A;
  color: #8B1A1A;
  border-style: solid;
}

/* ========== NATURE LEGEND ========== */
.nature-legend {
  display: flex;
  gap: 1rem;
  padding: 0.5rem 1.5rem;
  background: #FFFCF7;
  border-bottom: 1px solid #F0E8DD;
  font-size: 0.75rem;
  color: #8B7355;
  justify-content: center;
  flex-wrap: wrap;
}
.nature-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 4px;
}

/* ========== MAIN LAYOUT ========== */
.main-layout {
  display: flex;
  max-width: 1400px;
  margin: 0 auto;
  padding: 1.5rem;
  gap: 1.5rem;
  position: relative;
  z-index: 1;
  min-height: 60vh;
}
.sidebar {
  flex: 0 0 220px;
  position: sticky;
  top: 80px;
  align-self: flex-start;
  max-height: calc(100vh - 100px);
  overflow-y: auto;
}
.category-group {
  margin-bottom: 0.5rem;
}
.category-header {
  padding: 0.5rem 0.8rem;
  font-size: 0.82rem;
  font-weight: 700;
  color: #5C4A3A;
  cursor: pointer;
  border-radius: 6px;
  transition: background 0.2s;
  display: flex;
  justify-content: space-between;
  align-items: center;
  user-select: none;
}
.category-header:hover { background: #F0E8DD; }
.category-header .count {
  font-weight: 400;
  font-size: 0.7rem;
  color: #B8A89A;
}
.category-header .arrow {
  transition: transform 0.2s;
  font-size: 0.7rem;
}
.category-header .arrow.open { transform: rotate(90deg); }
.subcategories { padding-left: 0.5rem; }
.subcat-btn {
  display: block;
  width: 100%;
  text-align: left;
  padding: 0.3rem 0.8rem;
  border: none;
  background: none;
  font-size: 0.78rem;
  font-family: inherit;
  color: #8B7355;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.2s;
}
.subcat-btn:hover { background: #F0E8DD; color: #5C4A3A; }
.subcat-btn.active { background: #FFF0E0; color: #8B1A1A; font-weight: 600; }

/* ========== CONTENT AREA ========== */
.content-area { flex: 1; min-width: 0; }

/* ========== RESULTS STATS ========== */
.results-stats {
  font-size: 0.85rem;
  color: #8B7355;
  margin-bottom: 1rem;
  padding-bottom: 0.8rem;
  border-bottom: 1px solid #E8DDD0;
}
.results-stats strong { color: #5C4A3A; }

/* ========== HERB GRID ========== */
.herb-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1.2rem;
}

/* ========== HERB CARD ========== */
.herb-card {
  background: #FFFCF7;
  border: 1px solid #E8DDD0;
  border-radius: 12px;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
  cursor: pointer;
  position: relative;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.herb-card {
  animation: cardIn 0.4s ease-out both;
}
.herb-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(60, 36, 21, 0.12);
}
.herb-card .card-img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  display: block;
  background: #F8F4EE;
}
.herb-card .card-img-placeholder {
  width: 100%;
  height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #F8F4EE, #F0E8DD);
  color: #D4C5B0;
  font-size: 2.5rem;
}
.herb-card .card-body {
  padding: 0.9rem 1rem 1rem;
}
.herb-card .card-name-row {
  display: flex;
  align-items: baseline;
  gap: 0.5rem;
  margin-bottom: 0.3rem;
}
.herb-card .card-name {
  font-size: 1.15rem;
  font-weight: 700;
  color: #3C2415;
}
.herb-card .card-pinyin {
  font-size: 0.75rem;
  color: #B8A89A;
  font-style: italic;
}
.herb-card .card-latin {
  font-size: 0.72rem;
  color: #B8A89A;
  font-style: italic;
  margin-bottom: 0.4rem;
}
.herb-card .card-tags {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  margin-bottom: 0.4rem;
}
.herb-card .tag {
  display: inline-block;
  padding: 0.1rem 0.5rem;
  border-radius: 10px;
  font-size: 0.68rem;
}
.herb-card .tag-nature {
  background: #F0E8DD;
  color: #5C4A3A;
}
.herb-card .tag-nature-cold { background: #E8F0F8; color: #3A6A8B; }
.herb-card .tag-nature-hot { background: #FCE8E8; color: #B83A3A; }
.herb-card .tag-nature-warm { background: #FCF0E8; color: #B87A3A; }
.herb-card .tag-nature-cool { background: #E8F5F0; color: #3A8B6A; }
.herb-card .tag-nature-neutral { background: #F0ECE8; color: #7A6A5A; }
.herb-card .tag-effect {
  background: #FFF0E0;
  color: #8B5A3A;
}
.herb-card .card-effect {
  font-size: 0.8rem;
  color: #5C4A3A;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.herb-card .card-flavor {
  font-size: 0.72rem;
  color: #B8A89A;
  margin-top: 0.3rem;
}

/* ========== DETAIL MODAL ========== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(60, 36, 21, 0.6);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: none;
  justify-content: center;
  align-items: center;
  padding: 1.5rem;
  overflow-y: auto;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #FFFCF7;
  border-radius: 16px;
  max-width: 860px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  animation: modalIn 0.3s ease-out;
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-close {
  position: absolute;
  top: 1rem;
  right: 1rem;
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: rgba(60, 36, 21, 0.1);
  color: #5C4A3A;
  font-size: 1.2rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
.modal-close:hover { background: #8B1A1A; color: white; }
.modal-img {
  width: 100%;
  height: 340px;
  object-fit: cover;
  display: block;
  background: #F8F4EE;
  border-radius: 16px 16px 0 0;
}
.modal-img-placeholder {
  width: 100%;
  height: 340px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #F8F4EE, #F0E8DD);
  border-radius: 16px 16px 0 0;
  font-size: 4rem;
  color: #D4C5B0;
}
.modal-body { padding: 1.5rem 2rem 2rem; }
.modal-header {
  display: flex;
  align-items: baseline;
  gap: 0.8rem;
  margin-bottom: 0.5rem;
}
.modal-title {
  font-size: 2rem;
  font-weight: 900;
  color: #3C2415;
}
.modal-pinyin {
  font-size: 1rem;
  color: #B8A89A;
  font-style: italic;
}
.modal-latin {
  font-size: 0.88rem;
  color: #B8A89A;
  font-style: italic;
  margin-bottom: 1rem;
  border-bottom: 1px solid #F0E8DD;
  padding-bottom: 0.8rem;
}

/* ========== DETAIL INFO GRID ========== */
.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.info-item {
  background: #F8F4EE;
  border-radius: 8px;
  padding: 0.7rem 1rem;
}
.info-item .label {
  font-size: 0.72rem;
  color: #B8A89A;
  letter-spacing: 1px;
  margin-bottom: 0.2rem;
}
.info-item .value {
  font-size: 0.92rem;
  color: #3C2415;
  font-weight: 600;
}
.info-item .value.nature-cold { color: #4A7BB5; }
.info-item .value.nature-hot { color: #C41E3A; }
.info-item .value.nature-warm { color: #D4875E; }
.info-item .value.nature-cool { color: #5E9B8A; }
.info-item .value.nature-neutral { color: #8B7355; }

/* ========== DETAIL SECTIONS ========== */
.detail-section {
  margin-top: 1.2rem;
}
.detail-section h3 {
  font-size: 1rem;
  font-weight: 700;
  color: #8B1A1A;
  margin-bottom: 0.5rem;
  padding-left: 0.6rem;
  border-left: 3px solid #8B1A1A;
}
.detail-section p, .detail-section ul {
  font-size: 0.9rem;
  color: #4A3A2A;
  line-height: 1.8;
}
.detail-section ul {
  list-style: none;
  padding-left: 0;
}
.detail-section li {
  padding: 0.2rem 0;
  padding-left: 1.2rem;
  position: relative;
}
.detail-section li::before {
  content: '◆';
  position: absolute;
  left: 0;
  color: #D4A574;
  font-size: 0.5rem;
  top: 0.5rem;
}

/* ========== EMPTY STATE ========== */
.empty-state {
  text-align: center;
  padding: 4rem 2rem;
  color: #B8A89A;
}
.empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
.empty-state h3 { font-size: 1.1rem; color: #8B7355; margin-bottom: 0.5rem; }
.empty-state p { font-size: 0.88rem; }

/* ========== FOOTER ========== */
.footer {
  text-align: center;
  padding: 2rem;
  color: #B8A89A;
  font-size: 0.78rem;
  border-top: 1px solid #E8DDD0;
  margin-top: 2rem;
}

/* ========== BACK TO TOP ========== */
.back-to-top {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1px solid #E8DDD0;
  background: #FFFCF7;
  color: #8B7355;
  font-size: 1.2rem;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 2px 12px rgba(60, 36, 21, 0.1);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 50;
  opacity: 0;
  transform: translateY(10px);
}
.back-to-top.visible {
  display: flex;
  opacity: 1;
  transform: translateY(0);
}
.back-to-top:hover {
  background: #8B1A1A;
  color: white;
  border-color: #8B1A1A;
  box-shadow: 0 4px 16px rgba(139, 26, 26, 0.2);
}

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #D4C5B0; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #B8A89A; }

/* ========== LOADING ========== */
.loading {
  text-align: center;
  padding: 4rem 2rem;
  color: #8B7355;
}
.loading .spinner {
  display: inline-block;
  width: 32px; height: 32px;
  border: 3px solid #F0E8DD;
  border-top-color: #8B1A1A;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ========== RESPONSIVE - TABLET ========== */
@media (max-width: 900px) {
  .main-layout { flex-direction: column; padding: 1rem; }
  .sidebar {
    position: static;
    flex: none;
    max-height: none;
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
  }
  .category-group { flex: 1; min-width: 120px; }
  .header { padding: 1.5rem 1rem 1.2rem; }
  .header h1 { font-size: 1.6rem; letter-spacing: 3px; }
  .search-section { padding: 0.8rem 1rem; }
  .search-wrapper { flex-direction: column; align-items: stretch; }
  .filters { justify-content: center; }
  .herb-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.8rem; }
  .modal-body { padding: 1.2rem; }
  .modal-title { font-size: 1.5rem; }
  .modal-img, .modal-img-placeholder { height: 220px; }
  .info-grid { grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
  .back-to-top { bottom: 1rem; right: 1rem; width: 40px; height: 40px; }
}

/* ========== RESPONSIVE - MOBILE ========== */
@media (max-width: 640px) {
  /* ---- Safe area insets for notched phones ---- */
  .header {
    padding: calc(1.2rem + env(safe-area-inset-top, 0px)) 1rem 1rem;
  }
  .search-section {
    padding-top: calc(0.6rem + env(safe-area-inset-top, 0px));
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .footer {
    padding-bottom: calc(1rem + env(safe-area-inset-bottom, 0px));
  }
  .modal-overlay {
    padding: 0;
    align-items: flex-end;
  }
  .modal {
    max-width: 100%;
    max-height: 92vh;
    border-radius: 16px 16px 0 0;
    animation: modalSlideUp 0.35s ease-out;
  }
  @keyframes modalSlideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-body { padding: 1rem 1.2rem calc(1.2rem + env(safe-area-inset-bottom, 0px)); }
  .modal-close { top: 0.6rem; right: 0.6rem; }
  .modal-img, .modal-img-placeholder { height: 200px; border-radius: 16px 16px 0 0; }
  .modal-title { font-size: 1.3rem; }
  .modal-pinyin { font-size: 0.85rem; }
  /* Drag handle for bottom sheet */
  .modal::before {
    content: '';
    display: block;
    width: 36px; height: 4px;
    border-radius: 2px;
    background: #D4C5B0;
    margin: 8px auto 0;
    position: relative;
    z-index: 10;
  }

  /* ---- Header ---- */
  .header h1 { font-size: 1.2rem; letter-spacing: 2px; }
  .header .subtitle { font-size: 0.75rem; letter-spacing: 2px; }
  .header .count-badge { font-size: 0.7rem; margin-top: 0.4rem; }
  .random-btn {
    position: fixed;
    bottom: calc(1rem + env(safe-area-inset-bottom, 0px));
    right: 1rem;
    z-index: 99;
    margin: 0;
    padding: 0.6rem 1rem;
    border-radius: 24px;
    background: #8B1A1A;
    color: #FFFCF7;
    border: none;
    font-size: 0.85rem;
    box-shadow: 0 4px 16px rgba(139, 26, 26, 0.35);
    white-space: nowrap;
  }
  .random-btn:hover {
    background: #A52222;
    transform: scale(1.05);
  }

  /* ---- Search ---- */
  .search-wrapper { gap: 0.3rem; }
  .search-section { padding: 0.5rem 0.6rem; }
  .search-box { flex: 1; min-width: 0; }
  .search-box input {
    padding: 0.65rem 2rem 0.65rem 2rem;
    font-size: 16px;
    border-radius: 10px;
  }
  .search-box .icon { left: 0.6rem; font-size: 0.85rem; }
  .search-clear { right: 0.3rem; padding: 0.4rem; }

  /* ---- Filters: horizontal scroll --- */
  .filters {
    flex-wrap: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    gap: 0.4rem;
    padding: 0.2rem 0 0.4rem;
    justify-content: flex-start;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-group { flex-shrink: 0; }
  .filter-label { font-size: 0.7rem; }
  .filter-btn {
    padding: 0.4rem 0.8rem;
    font-size: 0.75rem;
    min-height: 36px;
  }
  .reset-btn {
    flex-shrink: 0;
    scroll-snap-align: start;
    min-height: 36px;
    padding: 0.4rem 0.8rem;
  }
  .nature-legend {
    padding: 0.4rem 0.8rem;
    font-size: 0.65rem;
    gap: 0.5rem;
    overflow-x: auto;
    flex-wrap: nowrap;
    justify-content: flex-start;
  }

  /* ---- Sidebar becomes bottom drawer / collapsible panel ---- */
  .sidebar {
    display: flex;
    flex-direction: row;
    flex-wrap: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    gap: 0.3rem;
    padding: 0.5rem 0;
    scroll-snap-type: x mandatory;
  }
  .sidebar::-webkit-scrollbar { display: none; }
  .category-group {
    flex: 0 0 auto;
    min-width: auto;
  }
  .category-header {
    white-space: nowrap;
    font-size: 0.75rem;
    padding: 0.4rem 0.7rem;
    border: 1px solid #E8DDD0;
    border-radius: 20px;
    min-height: 36px;
  }
  .category-header .arrow { display: none; }
  .category-header .count { display: none; }
  .subcategories { display: none !important; }

  /* ---- Herb grid ---- */
  .herb-grid { grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
  .herb-card { border-radius: 10px; }
  .herb-card .card-img { height: 130px; }
  .herb-card .card-img-placeholder { height: 130px; font-size: 1.8rem; }
  .herb-card .card-body { padding: 0.6rem 0.7rem 0.7rem; }
  .herb-card .card-name { font-size: 0.95rem; }
  .herb-card .card-pinyin { font-size: 0.65rem; }
  .herb-card .card-latin { font-size: 0.6rem; margin-bottom: 0.2rem; }
  .herb-card .tag { font-size: 0.6rem; padding: 0.05rem 0.4rem; }
  .herb-card .card-effect { font-size: 0.72rem; -webkit-line-clamp: 2; }
  .herb-card .card-flavor { font-size: 0.65rem; }

  /* ---- Info grid compact ---- */
  .info-item { padding: 0.5rem 0.7rem; }
  .info-item .value { font-size: 0.82rem; }
  .detail-section h3 { font-size: 0.9rem; }
  .detail-section p, .detail-section ul { font-size: 0.82rem; }

  /* ---- Footer ---- */
  .footer {
    padding: 1rem;
    font-size: 0.65rem;
    margin-top: 1rem;
  }

  /* ---- Back to top ---- */
  .back-to-top {
    bottom: 4rem;
    right: 1rem;
    width: 40px; height: 40px;
  }

  /* ---- Results stats ---- */
  .results-stats { font-size: 0.75rem; margin-bottom: 0.6rem; }

  /* ---- Loading ---- */
  .loading { padding: 3rem 1rem; }

  /* ---- Empty state ---- */
  .empty-state { padding: 3rem 1rem; }
  .empty-state .icon { font-size: 2.5rem; }
  .empty-state h3 { font-size: 1rem; }
}

/* ========== RESPONSIVE - SMALL PHONES ========== */
@media (max-width: 380px) {
  .herb-grid { grid-template-columns: 1fr; gap: 0.5rem; }
  .header h1 { font-size: 1rem; }
  .header { padding-top: calc(1rem + env(safe-area-inset-top, 0px)); }
  .modal-img, .modal-img-placeholder { height: 160px; }
}

/* ========== TOUCH OPTIMIZATIONS ========== */
@media (hover: none) and (pointer: coarse) {
  .herb-card:hover {
    transform: none;
    box-shadow: 0 2px 8px rgba(60, 36, 21, 0.08);
  }
  .herb-card:active {
    transform: scale(0.98);
    opacity: 0.9;
  }
  .filter-btn:hover {
    background: transparent;
    border-color: #E8DDD0;
    color: #5C4A3A;
  }
  .filter-btn:active {
    opacity: 0.7;
  }
  .back-to-top:hover {
    background: #FFFCF7;
    color: #8B7355;
    border-color: #E8DDD0;
  }
  .modal-close:hover {
    background: rgba(60, 36, 21, 0.1);
    color: #5C4A3A;
  }
}

/* ========== DARK MODE - MOBILE SAFE AREA ========== */
@media (prefers-color-scheme: dark) {
  .random-btn {
    box-shadow: 0 4px 16px rgba(139, 26, 26, 0.5);
  }
}
</style>
</head>
<body>

<!-- ========== HEADER ========== -->
<header class="header">
  <h1>动态中国草药名录</h1>
  <div class="subtitle">— 本草纲目 · 现代编 —</div>
  <div class="count-badge" id="headerCount">载录中⋯味</div>
<button class="random-btn" id="randomBtn" title="随机一味草药">🎲 随机一味</button>
</header>

<!-- ========== SEARCH + FILTERS ========== -->
<section class="search-section">
  <div class="search-wrapper">
    <div class="search-box">
      <span class="icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索草药名称、功效、主治⋯" autocomplete="off">
      <button class="search-clear" id="searchClear">✕</button>
    </div>
    <div class="filters">
      <div class="filter-group">
        <span class="filter-label">药性</span>
        <button class="filter-btn nature-cold" data-filter="nature" data-value="寒">寒</button>
        <button class="filter-btn nature-hot" data-filter="nature" data-value="热">热</button>
        <button class="filter-btn nature-warm" data-filter="nature" data-value="温">温</button>
        <button class="filter-btn nature-cool" data-filter="nature" data-value="凉">凉</button>
        <button class="filter-btn nature-neutral" data-filter="nature" data-value="平">平</button>
      </div>
      <button class="reset-btn" id="resetFilters">重置筛选</button>
    </div>
  </div>
</section>

<!-- ========== NATURE LEGEND ========== -->
<div class="nature-legend">
  <span><span class="nature-dot" style="background:#4A7BB5"></span>寒</span>
  <span><span class="nature-dot" style="background:#C41E3A"></span>热</span>
  <span><span class="nature-dot" style="background:#D4875E"></span>温</span>
  <span><span class="nature-dot" style="background:#5E9B8A"></span>凉</span>
  <span><span class="nature-dot" style="background:#8B7355"></span>平</span>
  <span style="margin-left:1rem;color:#B8A89A;">｜点击卡片查看详情</span>
</div>

<!-- ========== MAIN LAYOUT ========== -->
<div class="main-layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar"></aside>
  <!-- Content -->
  <main class="content-area">
    <div class="results-stats" id="resultsStats"></div>
    <div id="herbGrid" class="herb-grid"></div>
  </main>
</div>

<!-- ========== DETAIL MODAL ========== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<!-- ========== BACK TO TOP ========== -->
<button class="back-to-top" id="backToTop" title="返回顶部">↑</button>

<!-- ========== FOOTER ========== -->
<footer class="footer">
  动态中国草药名录 · 都米数字员工团队编纂 · 内容仅供学习参考
</footer>

<!-- ========== JAVASCRIPT ========== -->
<script>
// ============================================================
// HERB DATA (loaded from herbs.json)
// ============================================================
let allHerbs = [];
let effectCategories = {};

// ============================================================
// STATE
// ============================================================
const state = {
  herbs: [],
  search: '',
  natureFilter: '',
  categoryFilter: '',
  subcategoryFilter: ''
};

// ============================================================
// LOAD DATA
// ============================================================
async function loadData() {
  const grid = document.getElementById('herbGrid');
  grid.innerHTML = '<div class="loading"><div class="spinner"></div><p>正在载录本草⋯</p></div>';

  try {
    const resp = await fetch('herbs.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    allHerbs = data.herbs || [];
    effectCategories = data.categories || {};
    buildSidebar();
    applyFilters();
    updateHeaderCount();
  } catch (e) {
    console.error('Failed to load herbs.json, using embedded data.', e);
    // Fallback: use minimal embedded data
    allHerbs = getEmbeddedHerbs();
    effectCategories = getEmbeddedCategories();
    buildSidebar();
    applyFilters();
    updateHeaderCount();
  }
}

// ============================================================
// BUILD SIDEBAR
// ============================================================
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  let html = '';
  for (const [catName, cat] of Object.entries(effectCategories)) {
    const subs = cat.subcategories || [];
    const total = subs.reduce((s, sub) => s + (sub.herbs?.length || 0), 0);
    html += `
      <div class="category-group">
        <div class="category-header" onclick="toggleCategory(this)">
          <span>${catName} <span class="count">${total}</span></span>
          <span class="arrow open">›</span>
        </div>
        <div class="subcategories" style="display:block">
          ${subs.map(sub => `
            <button class="subcat-btn" data-category="${catName}" data-subcategory="${sub.name}"
              onclick="filterSubcategory('${catName}', '${sub.name}')">
              ${sub.name} <span class="count">${sub.herbs.length}</span>
            </button>
          `).join('')}
        </div>
      </div>`;
  }
  sidebar.innerHTML = html;
}

function toggleCategory(el) {
  const subs = el.nextElementSibling;
  const arrow = el.querySelector('.arrow');
  if (subs.style.display === 'none') {
    subs.style.display = 'block';
    arrow.classList.add('open');
  } else {
    subs.style.display = 'none';
    arrow.classList.remove('open');
  }
}

function filterSubcategory(cat, sub) {
  state.categoryFilter = cat;
  state.subcategoryFilter = sub;
  state.natureFilter = '';
  document.querySelectorAll('.subcat-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.subcat-btn[data-category="' + cat + '"][data-subcategory="' + sub + '"]')
    .forEach(b => b.classList.add('active'));
  document.querySelectorAll('.filter-btn.active').forEach(b => b.classList.remove('active'));
  applyFilters();
}

// ============================================================
// FILTERS
// ============================================================
document.getElementById('searchInput').addEventListener('input', function() {
  state.search = this.value.toLowerCase();
  document.getElementById('searchClear').classList.toggle('visible', this.value.length > 0);
  state.categoryFilter = '';
  state.subcategoryFilter = '';
  document.querySelectorAll('.subcat-btn.active').forEach(b => b.classList.remove('active'));
  applyFilters();
});

document.getElementById('searchClear').addEventListener('click', function() {
  document.getElementById('searchInput').value = '';
  state.search = '';
  this.classList.remove('visible');
  state.categoryFilter = '';
  state.subcategoryFilter = '';
  document.querySelectorAll('.subcat-btn.active').forEach(b => b.classList.remove('active'));
  applyFilters();
});

document.querySelectorAll('.filter-btn[data-filter="nature"]').forEach(btn => {
  btn.addEventListener('click', function() {
    const val = this.dataset.value;
    if (state.natureFilter === val) {
      state.natureFilter = '';
      this.classList.remove('active');
    } else {
      document.querySelectorAll('.filter-btn[data-filter="nature"]').forEach(b => b.classList.remove('active'));
      state.natureFilter = val;
      this.classList.add('active');
    }
    state.categoryFilter = '';
    state.subcategoryFilter = '';
    document.querySelectorAll('.subcat-btn.active').forEach(b => b.classList.remove('active'));
    applyFilters();
  });
});

document.getElementById('resetFilters').addEventListener('click', function() {
  state.search = '';
  state.natureFilter = '';
  state.categoryFilter = '';
  state.subcategoryFilter = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('visible');
  document.querySelectorAll('.filter-btn.active').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.subcat-btn.active').forEach(b => b.classList.remove('active'));
  applyFilters();
});

// ============================================================
// APPLY FILTERS
// ============================================================
function applyFilters() {
  let filtered = allHerbs;

  if (state.search) {
    const q = state.search;
    filtered = filtered.filter(h =>
      h.name.includes(q) ||
      (h.pinyin && h.pinyin.includes(q)) ||
      (h.latin && h.latin.toLowerCase().includes(q)) ||
      (h.effect && h.effect.includes(q)) ||
      (h.indications && h.indications.includes(q)) ||
      (h.description && h.description.includes(q)) ||
      (h.category && h.category.includes(q))
    );
  }

  if (state.natureFilter) {
    filtered = filtered.filter(h => h.nature === state.natureFilter);
  }

  if (state.subcategoryFilter) {
    filtered = filtered.filter(h => h.subcategory === state.subcategoryFilter);
  } else if (state.categoryFilter) {
    const cat = effectCategories[state.categoryFilter];
    if (cat) {
      const subHerbs = new Set();
      cat.subcategories.forEach(sub => sub.herbs.forEach(name => subHerbs.add(name)));
      filtered = filtered.filter(h => subHerbs.has(h.id || h.name));
    }
  }

  state.herbs = filtered;
  renderGrid();
}

// ============================================================
// RENDER GRID
// ============================================================
function renderGrid() {
  const grid = document.getElementById('herbGrid');
  const stats = document.getElementById('resultsStats');
  const total = allHerbs.length;

  stats.textContent = `共 ${state.herbs.length} 味（收录 ${total} 味）`;

  if (state.herbs.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="icon">🌿</div>
        <h3>未找到匹配的草药</h3>
        <p>试试其他关键词或取消筛选条件</p>
      </div>`;
    return;
  }

  grid.innerHTML = state.herbs.map((h, i) => {
    const natureClass = `tag-nature-${h.nature}`;
    const imgSrc = getImageSrc(h);
    return `
      <div class="herb-card" onclick="openDetail('${h.id || h.name}')" style="animation-delay:${(i % 20) * 0.03}s">
        ${imgSrc
          ? `<img class="card-img" src="${imgSrc}" alt="${h.name}" loading="lazy" onerror="webpFallback(this)">`
          : `<div class="card-img-placeholder">🌿</div>`
        }
        <div class="card-body">
          <div class="card-name-row">
            <span class="card-name">${h.name}</span>
            ${h.pinyin ? `<span class="card-pinyin">${h.pinyin}</span>` : ''}
          </div>
          ${h.latin ? `<div class="card-latin">${h.latin}</div>` : ''}
          <div class="card-tags">
            <span class="tag tag-nature ${natureClass}">${h.nature}性</span>
            <span class="tag tag-effect">${h.category || ''}</span>
          </div>
          <div class="card-effect">${truncate(h.effect || h.indications || '', 50)}</div>
          ${h.flavor ? `<div class="card-flavor">味${h.flavor}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

function truncate(str, len) {
  if (!str) return '';
  return str.length > len ? str.slice(0, len) + '…' : str;
}

// ============================================================
// DETAIL MODAL
// ============================================================
function openDetail(id) {
  const herb = allHerbs.find(h => (h.id || h.name) === id);
  if (!herb) return;

  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');

  const natureClass = `nature-${herb.nature}`;
  const imgSrc = getImageSrc(herb);

  content.innerHTML = `
    ${imgSrc
      ? `<img class="modal-img" src="${imgSrc}" alt="${herb.name}" onerror="webpFallback(this)">`
      : `<div class="modal-img-placeholder">🌿</div>`
    }
    <div class="modal-body">
      <div class="modal-header">
        <h2 class="modal-title">${herb.name}</h2>
        ${herb.pinyin ? `<span class="modal-pinyin">${herb.pinyin}</span>` : ''}
      </div>
      ${herb.latin ? `<div class="modal-latin">${herb.latin}</div>` : ''}

      <div class="info-grid">
        ${herb.nature ? `<div class="info-item"><div class="label">药性</div><div class="value ${natureClass}">${herb.nature}</div></div>` : ''}
        ${herb.flavor ? `<div class="info-item"><div class="label">五味</div><div class="value">${herb.flavor}</div></div>` : ''}
        ${herb.meridian ? `<div class="info-item"><div class="label">归经</div><div class="value">${herb.meridian}</div></div>` : ''}
        ${herb.category ? `<div class="info-item"><div class="label">分类</div><div class="value">${herb.category}</div></div>` : ''}
        ${herb.subcategory ? `<div class="info-item"><div class="label">子类</div><div class="value">${herb.subcategory}</div></div>` : ''}
        ${herb.dosage ? `<div class="info-item"><div class="label">用法用量</div><div class="value">${herb.dosage}</div></div>` : ''}
      </div>

      ${herb.effect ? `
        <div class="detail-section">
          <h3>功效主治</h3>
          <p>${herb.effect}</p>
          ${herb.indications ? `<p style="margin-top:0.3rem">${herb.indications}</p>` : ''}
        </div>` : ''}

      ${herb.description ? `
        <div class="detail-section">
          <h3>药材介绍</h3>
          <p>${herb.description}</p>
        </div>` : ''}

      ${herb.distribution ? `
        <div class="detail-section">
          <h3>产地分布</h3>
          <p>${herb.distribution}</p>
        </div>` : ''}

      ${herb.harvest ? `
        <div class="detail-section">
          <h3>采收加工</h3>
          <p>${herb.harvest}</p>
        </div>` : ''}

      ${herb.usage ? `
        <div class="detail-section">
          <h3>用法用量</h3>
          <p>${herb.usage}</p>
        </div>` : ''}

      ${herb.caution ? `
        <div class="detail-section">
          <h3>使用注意</h3>
          <p>${herb.caution}</p>
        </div>` : ''}

      ${herb.combination ? `
        <div class="detail-section">
          <h3>经典配伍</h3>
          <ul>${herb.combination.map(c => `<li>${c}</li>`).join('')}</ul>
        </div>` : ''}
    </div>
  `;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalClose').addEventListener('click', closeDetail);
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeDetail();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
});

// ============================================================
// HEADER COUNT
// ============================================================
// ============================================================
// BACK TO TOP + FLOATING RANDOM BTN BEHAVIOR
// ============================================================
const backToTop = document.getElementById('backToTop');
const randomBtn = document.getElementById('randomBtn');
let lastScrollY = 0;
window.addEventListener('scroll', function() {
  const currentScrollY = window.scrollY;
  if (currentScrollY > 400) {
    backToTop.classList.add('visible');
  } else {
    backToTop.classList.remove('visible');
  }
  // Hide floating random button when scrolling down on mobile
  if (window.innerWidth <= 640) {
    if (currentScrollY > lastScrollY && currentScrollY > 200) {
      randomBtn.style.transform = 'translateY(80px)';
      randomBtn.style.opacity = '0';
    } else {
      randomBtn.style.transform = 'translateY(0)';
      randomBtn.style.opacity = '1';
    }
  }
  lastScrollY = currentScrollY;
});
backToTop.addEventListener('click', function() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// ============================================================
// RANDOM HERB
// ============================================================
document.getElementById('randomBtn').addEventListener('click', function() {
  if (allHerbs.length === 0) return;
  const randomHerb = allHerbs[Math.floor(Math.random() * allHerbs.length)];
  openDetail(randomHerb.id || randomHerb.name);
});

// ============================================================
// MOBILE TOUCH - swipe down to close modal
// ============================================================
(function() {
  let touchStartY = 0;
  let touchCurrentY = 0;
  let isDragging = false;
  const modal = document.getElementById('modal');
  const overlay = document.getElementById('modalOverlay');

  overlay.addEventListener('touchstart', function(e) {
    if (e.target.closest('.modal')) {
      const modalRect = modal.getBoundingClientRect();
      if (e.touches[0].clientY - modalRect.top < 40) {
        touchStartY = e.touches[0].clientY;
        isDragging = true;
        modal.style.transition = 'none';
      }
    }
  }, { passive: true });

  overlay.addEventListener('touchmove', function(e) {
    if (!isDragging) return;
    touchCurrentY = e.touches[0].clientY;
    const delta = touchCurrentY - touchStartY;
    if (delta > 0) {
      modal.style.transform = `translateY(${delta}px)`;
      overlay.style.background = `rgba(60, 36, 21, ${Math.max(0, 0.6 - delta / 1000)})`;
    }
  }, { passive: true });

  overlay.addEventListener('touchend', function() {
    if (!isDragging) return;
    isDragging = false;
    modal.style.transition = '';
    modal.style.transform = '';
    overlay.style.background = '';
    const delta = touchCurrentY - touchStartY;
    if (delta > 100) {
      closeDetail();
    }
  }, { passive: true });
})();

// ============================================================
// IMAGE FALLBACK - WebP → PNG → placeholder
// ============================================================
function webpFallback(img) {
  const src = img.getAttribute('src') || '';
  const pngSrc = src.replace(/\.webp$/i, '.png');
  if (src.endsWith('.webp') && pngSrc !== src) {
    // Try PNG fallback
    img.setAttribute('src', pngSrc);
    img.setAttribute('onerror', "this.style.display='none';const p=this.parentElement;const ph=p.querySelector('.card-img-placeholder, .modal-img-placeholder');if(ph)ph.style.display='flex'");
  } else {
    img.style.display = 'none';
    const p = img.parentElement;
    const ph = p.querySelector('.card-img-placeholder, .modal-img-placeholder');
    if (ph) ph.style.display = 'flex';
  }
}

// ============================================================
// IMAGE UTILITY - prefer WebP, fallback to PNG/SVG
// ============================================================
function herbImageUrl(herb) {
  if (herb.image) {
    const base = herb.image.replace(/\.(png|jpg|jpeg)$/i, '');
    return `images/${base}.webp`;
  }
  if (herb.id) return `images/${herb.id}.webp`;
  return '';
}

// Override image path logic in renderGrid
function getImageSrc(h) {
  if (h.image) {
    const base = h.image.replace(/\.(png|jpg|jpeg)$/i, '');
    return `images/${base}.webp`;
  }
  if (h.id) return `images/${h.id}.webp`;
  return '';
}
