<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" width="400" height="340">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F0E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F0E8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="400" height="340" fill="url(#skyGrad)"/>

  <!-- Scene background -->
  <g opacity="0.16">
      <!-- 崖壁 -->
      <path d="M0,180 L40,160 L80,185 L120,155 L160,175 L200,150 L240,170 L280,148 L320,168 L360,145 L400,165 L400,260 Q300,255 200,258 Q100,262 0,258 Z" fill="#8A8A7A" opacity="0.5"/>
      <path d="M0,200 Q100,195 200,202 Q300,196 400,200 L400,340 L0,340 Z" fill="#6A5A4A" opacity="0.4"/>
      <!-- 崖壁纹理 -->
      <path d="M40,170 L40,200 M120,165 L120,195 M200,158 L200,190 M280,155 L280,188 M360,152 L360,185" stroke="#7A7A6A" stroke-width="0.3" fill="none" opacity="0.3"/>
      <!-- 远云 -->
      <ellipse cx="80" cy="190" rx="50" ry="8" fill="white" opacity="0.04"/>
      <ellipse cx="300" cy="175" rx="70" ry="10" fill="white" opacity="0.03"/>
    </g>

  <!-- Scene extras -->
  <g opacity="0.06">
      <circle cx="50" cy="185" r="1.5" fill="white"/>
      <circle cx="350" cy="170" r="1" fill="white"/>
    </g>

  <!-- Plant (foreground) -->
  <g transform="translate(200,260)">
    <!-- 茎（石斛特征 - 多节） -->
    <path d="M0,0 Q8,-20 6,-40 Q4,-60 5,-80 Q6,-100 4,-120" stroke="#4A8A5A" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M0,0 Q8,-20 6,-40 Q4,-60 5,-80 Q6,-100 4,-120" stroke="#5A9A6A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- 节 -->
    <line x1="-2" y1="-20" x2="10" y2="-20" stroke="#3A7A4A" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-40" x2="9" y2="-40" stroke="#3A7A4A" stroke-width="1" opacity="0.5"/>
    <line x1="1" y1="-60" x2="8" y2="-60" stroke="#3A7A4A" stroke-width="1" opacity="0.5"/>
    <line x1="2" y1="-80" x2="9" y2="-80" stroke="#3A7A4A" stroke-width="1" opacity="0.5"/>
    <!-- 叶 -->
    <ellipse cx="-10" cy="-25" rx="8" ry="4" fill="#5A9A6A" opacity="0.7" transform="rotate(-20,-10,-25)"/>
    <ellipse cx="14" cy="-50" rx="8" ry="4" fill="#5A9A6A" opacity="0.7" transform="rotate(20,14,-50)"/>
    <ellipse cx="-8" cy="-90" rx="7" ry="3.5" fill="#5A9A6A" opacity="0.6" transform="rotate(-15,-8,-90)"/>
    <!-- 花 -->
    <circle cx="4" cy="-125" r="6" fill="#E8B0C0" opacity="0.7"/>
    <circle cx="0" cy="-122" r="4" fill="#F0C0D0" opacity="0.6"/>
    <circle cx="4" cy="-125" r="2" fill="#D490A0"/>
  </g>

  <!-- Ground cover -->
  <path d="M0,258 Q100,256 200,260 Q300,255 400,258 L400,265 L0,265 Z" fill="#6A5A4A" opacity="0.08"/>

  <!-- Chinese seal stamp -->
  <g transform="translate(330,50)">
    <rect x="-18" y="-18" width="36" height="36" fill="none" stroke="#4A8A5A" stroke-width="1.2" rx="2" opacity="0.25"/>
    <text x="0" y="4" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="9" fill="#4A8A5A" opacity="0.3">药</text>
  </g>

  <!-- Decorative elements -->
  <circle cx="40" cy="50" r="2" fill="#4A8A5A" opacity="0.06"/>
  <circle cx="360" cy="130" r="1.5" fill="#4A8A5A" opacity="0.05"/>

  <!-- Title -->
  <text x="200" y="312" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="16" font-weight="700" fill="#4A8A5A" opacity="0.75">石斛</text>
  <text x="200" y="328" text-anchor="middle" font-family="Georgia,serif" font-size="7" font-style="italic" fill="#4A8A5A" opacity="0.35">Dendrobium nobile Lindl.</text>
  <text x="200" y="20" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="8" fill="#4A8A5A" opacity="0.25">石斛 · 峭壁</text>
</svg>