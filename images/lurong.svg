<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" width="400" height="340">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F0E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F0E8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="400" height="340" fill="url(#skyGrad)"/>

  <!-- Scene background -->
  <g opacity="0.18">
      <!-- 林地背景 -->
      <rect x="0" y="180" width="400" height="160" fill="#6A5A3A" opacity="0.4"/>
      <!-- 树木 -->
      <rect x="30" y="160" width="10" height="100" fill="#5A3A1A" rx="2"/>
      <circle cx="35" cy="155" r="30" fill="#4A6A3A" opacity="0.4"/>
      <rect x="350" y="140" width="8" height="120" fill="#5A3A1A" rx="2"/>
      <circle cx="354" cy="135" r="25" fill="#4A6A3A" opacity="0.35"/>
      <!-- 光斑 -->
      <ellipse cx="200" cy="200" rx="80" ry="40" fill="white" opacity="0.04"/>
      <!-- 地面纹理 -->
      <path d="M0,260 Q50,258 100,262 Q200,256 300,260 Q350,264 400,258" stroke="#5A4A2A" stroke-width="0.5" fill="none" opacity="0.3"/>
    </g>

  <!-- Scene extras -->
  <g opacity="0.08">
      <circle cx="120" cy="180" r="2" fill="white"/>
      <circle cx="280" cy="195" r="1.5" fill="white"/>
      <circle cx="180" cy="170" r="1" fill="white"/>
    </g>

  <!-- Plant (foreground) -->
  <g transform="translate(200,260)">
    <!-- 这是动物药，画梅花鹿 -->
    <ellipse cx="0" cy="-50" rx="25" ry="35" fill="#C48050" opacity="0.35"/>
    <ellipse cx="0" cy="-50" rx="20" ry="30" fill="#D49060" opacity="0.25"/>
    <!-- 鹿角（鹿茸特征） -->
    <path d="M-10,-75 Q-15,-85 -20,-100 Q-22,-105 -18,-110" stroke="#8A6A3A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-18,-98 Q-25,-102 -28,-95" stroke="#8A6A3A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M10,-75 Q15,-85 20,-100 Q22,-105 18,-110" stroke="#8A6A3A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M18,-98 Q25,-102 28,-95" stroke="#8A6A3A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- 鹿角茸毛 -->
    <circle cx="-20" cy="-108" r="4" fill="#B09070" opacity="0.3"/>
    <circle cx="20" cy="-108" r="4" fill="#B09070" opacity="0.3"/>
    <!-- 梅花斑点 -->
    <circle cx="-5" cy="-55" r="3" fill="white" opacity="0.15"/>
    <circle cx="8" cy="-45" r="2.5" fill="white" opacity="0.12"/>
    <circle cx="-10" cy="-40" r="2" fill="white" opacity="0.1"/>
  </g>

  <!-- Ground cover -->
  <path d="M0,258 Q100,256 200,260 Q300,255 400,258 L400,265 L0,265 Z" fill="#6A5A3A" opacity="0.08"/>

  <!-- Chinese seal stamp -->
  <g transform="translate(330,50)">
    <rect x="-18" y="-18" width="36" height="36" fill="none" stroke="#C47A3A" stroke-width="1.2" rx="2" opacity="0.25"/>
    <text x="0" y="4" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="9" fill="#C47A3A" opacity="0.3">药</text>
  </g>

  <!-- Decorative elements -->
  <circle cx="40" cy="50" r="2" fill="#C47A3A" opacity="0.06"/>
  <circle cx="360" cy="130" r="1.5" fill="#C47A3A" opacity="0.05"/>

  <!-- Title -->
  <text x="200" y="312" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="16" font-weight="700" fill="#C47A3A" opacity="0.75">鹿茸</text>
  <text x="200" y="328" text-anchor="middle" font-family="Georgia,serif" font-size="7" font-style="italic" fill="#C47A3A" opacity="0.35">Cervus nippon Temminck / Cervus elaphus L.</text>
  <text x="200" y="20" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="8" fill="#C47A3A" opacity="0.25">鹿茸 · 林间</text>
</svg>