<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" width="400" height="340">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F0E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F0E8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="400" height="340" fill="url(#skyGrad)"/>

  <!-- Scene background -->
  <g opacity="0.18">
      <!-- 林地背景 -->
      <rect x="0" y="180" width="400" height="160" fill="#5A3A2A" opacity="0.4"/>
      <!-- 树木 -->
      <rect x="30" y="160" width="10" height="100" fill="#5A3A1A" rx="2"/>
      <circle cx="35" cy="155" r="30" fill="#4A6A3A" opacity="0.4"/>
      <rect x="350" y="140" width="8" height="120" fill="#5A3A1A" rx="2"/>
      <circle cx="354" cy="135" r="25" fill="#4A6A3A" opacity="0.35"/>
      <!-- 光斑 -->
      <ellipse cx="200" cy="200" rx="80" ry="40" fill="white" opacity="0.04"/>
      <!-- 地面纹理 -->
      <path d="M0,260 Q50,258 100,262 Q200,256 300,260 Q350,264 400,258" stroke="#4A3A1A" stroke-width="0.5" fill="none" opacity="0.3"/>
    </g>

  <!-- Scene extras -->
  <g opacity="0.08">
      <circle cx="120" cy="180" r="2" fill="white"/>
      <circle cx="280" cy="195" r="1.5" fill="white"/>
      <circle cx="180" cy="170" r="1" fill="white"/>
    </g>

  <!-- Plant (foreground) -->
  <g transform="translate(200,260)">
    <path d="M0,0 L0,-50" stroke="#5A7A3A" stroke-width="3" fill="none"/>
    <!-- 掌状复叶 -->
    <ellipse cx="-12" cy="-20" rx="6" ry="14" fill="#5A8A4A" opacity="0.7" transform="rotate(-15,-12,-20)"/>
    <ellipse cx="0" cy="-25" rx="6" ry="14" fill="#6A9A5A" opacity="0.7"/>
    <ellipse cx="12" cy="-20" rx="6" ry="14" fill="#5A8A4A" opacity="0.7" transform="rotate(15,12,-20)"/>
    <ellipse cx="-6" cy="-15" rx="5" ry="10" fill="#6A9A5A" opacity="0.6" transform="rotate(-8,-6,-15)"/>
    <ellipse cx="6" cy="-15" rx="5" ry="10" fill="#6A9A5A" opacity="0.6" transform="rotate(8,6,-15)"/>
    <!-- 花序 -->
    <circle cx="0" cy="-55" r="6" fill="#C0D0A0" opacity="0.5"/>
    <circle cx="-4" cy="-53" r="4" fill="#D0E0B0" opacity="0.4"/>
    <circle cx="4" cy="-53" r="4" fill="#D0E0B0" opacity="0.4"/>
    <!-- 根（三七特征 - 类圆锥形） -->
    <ellipse cx="0" cy="12" rx="8" ry="14" fill="#8A6A3A" opacity="0.6"/>
    <ellipse cx="0" cy="12" rx="5" ry="10" fill="#9A7A4A" opacity="0.4"/>
  </g>

  <!-- Ground cover -->
  <path d="M0,258 Q100,256 200,260 Q300,255 400,258 L400,265 L0,265 Z" fill="#5A3A2A" opacity="0.08"/>

  <!-- Chinese seal stamp -->
  <g transform="translate(330,50)">
    <rect x="-18" y="-18" width="36" height="36" fill="none" stroke="#6A6A3A" stroke-width="1.2" rx="2" opacity="0.25"/>
    <text x="0" y="4" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="9" fill="#6A6A3A" opacity="0.3">药</text>
  </g>

  <!-- Decorative elements -->
  <circle cx="40" cy="50" r="2" fill="#6A6A3A" opacity="0.06"/>
  <circle cx="360" cy="130" r="1.5" fill="#6A6A3A" opacity="0.05"/>

  <!-- Title -->
  <text x="200" y="312" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="16" font-weight="700" fill="#6A6A3A" opacity="0.75">三七</text>
  <text x="200" y="328" text-anchor="middle" font-family="Georgia,serif" font-size="7" font-style="italic" fill="#6A6A3A" opacity="0.35">Notoginseng Radix et Rhizoma</text>
  <text x="200" y="20" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="8" fill="#6A6A3A" opacity="0.25">三七 · 林下</text>
</svg>