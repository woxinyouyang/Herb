<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" width="400" height="340">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F0E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F0E8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="400" height="340" fill="url(#skyGrad)"/>

  <!-- Scene background -->
  <g opacity="0.18">
      <!-- 林地背景 -->
      <rect x="0" y="180" width="400" height="160" fill="#5A4A2A" opacity="0.4"/>
      <!-- 树木 -->
      <rect x="30" y="160" width="10" height="100" fill="#5A3A1A" rx="2"/>
      <circle cx="35" cy="155" r="30" fill="#4A6A3A" opacity="0.4"/>
      <rect x="350" y="140" width="8" height="120" fill="#5A3A1A" rx="2"/>
      <circle cx="354" cy="135" r="25" fill="#4A6A3A" opacity="0.35"/>
      <!-- 光斑 -->
      <ellipse cx="200" cy="200" rx="80" ry="40" fill="white" opacity="0.04"/>
      <!-- 地面纹理 -->
      <path d="M0,260 Q50,258 100,262 Q200,256 300,260 Q350,264 400,258" stroke="#4A3A1A" stroke-width="0.5" fill="none" opacity="0.3"/>
    </g>

  <!-- Scene extras -->
  <g opacity="0.08">
      <circle cx="120" cy="180" r="2" fill="white"/>
      <circle cx="280" cy="195" r="1.5" fill="white"/>
      <circle cx="180" cy="170" r="1" fill="white"/>
    </g>

  <!-- Plant (foreground) -->
  <g transform="translate(200,260)">
    <!-- 藤 -->
    <path d="M0,0 Q-10,-25 -5,-50 Q0,-75 -3,-100" stroke="#5A7A3A" stroke-width="2.5" fill="none"/>
    <!-- 心形叶（何首乌特征） -->
    <path d="M-5,-30 Q-5,-45 5,-45 Q15,-45 15,-30 Q15,-15 5,-15 Q-5,-15 -5,-30 Z" fill="#5A8A4A" opacity="0.7"/>
    <path d="M-3,-65 Q-3,-80 7,-80 Q17,-80 17,-65 Q17,-50 7,-50 Q-3,-50 -3,-65 Z" fill="#6A9A5A" opacity="0.6"/>
    <!-- 根块（何首乌特征 - 膨大块根） -->
    <ellipse cx="-3" cy="15" rx="14" ry="18" fill="#8A6A3A" opacity="0.6"/>
    <ellipse cx="-3" cy="15" rx="10" ry="14" fill="#9A7A4A" opacity="0.4"/>
    <path d="M-3,33 Q-5,40 -3,48" stroke="#8A6A3A" stroke-width="2" fill="none"/>
    <!-- 花 -->
    <circle cx="-3" cy="-105" r="4" fill="#F0E8C8" opacity="0.5"/>
    <circle cx="-6" cy="-103" r="3" fill="#F5F0D0" opacity="0.4"/>
    <circle cx="0" cy="-108" r="3" fill="#F0E8C8" opacity="0.4"/>
  </g>

  <!-- Ground cover -->
  <path d="M0,258 Q100,256 200,260 Q300,255 400,258 L400,265 L0,265 Z" fill="#5A4A2A" opacity="0.08"/>

  <!-- Chinese seal stamp -->
  <g transform="translate(330,50)">
    <rect x="-18" y="-18" width="36" height="36" fill="none" stroke="#6A5A3A" stroke-width="1.2" rx="2" opacity="0.25"/>
    <text x="0" y="4" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="9" fill="#6A5A3A" opacity="0.3">药</text>
  </g>

  <!-- Decorative elements -->
  <circle cx="40" cy="50" r="2" fill="#6A5A3A" opacity="0.06"/>
  <circle cx="360" cy="130" r="1.5" fill="#6A5A3A" opacity="0.05"/>

  <!-- Title -->
  <text x="200" y="312" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="16" font-weight="700" fill="#6A5A3A" opacity="0.75">何首乌</text>
  <text x="200" y="328" text-anchor="middle" font-family="Georgia,serif" font-size="7" font-style="italic" fill="#6A5A3A" opacity="0.35">Polygonum multiflorum Thunb.</text>
  <text x="200" y="20" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="8" fill="#6A5A3A" opacity="0.25">何首乌 · 林下</text>
</svg>