<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" width="400" height="340">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F8F0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6eee6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3A5A3A;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#3A5A3A;stop-opacity:0.02" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="340" fill="url(#bgGrad)" rx="4"/>

  <!-- Decorative border -->
  <rect x="8" y="8" width="384" height="324" fill="none" stroke="#3A5A3A" stroke-width="0.5" rx="2" opacity="0.2"/>

  <!-- Ground line -->
  <path d="M50,270 Q100,265 200,268 Q300,271 350,267" stroke="#3A5A3A" stroke-width="0.8" fill="none" opacity="0.2"/>

  <!-- Plant illustration -->
  <g transform="translate(200,260)">
    <path d="M-5,0 C-8,-30 -5,-60 0,-90" stroke="#5E8A5E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M5,0 C8,-25 10,-50 8,-75" stroke="#5E8A5E" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M0,0 C-15,-20 -18,-45 -15,-70" stroke="#5E8A5E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M0,0 C15,-20 18,-45 15,-70" stroke="#5E8A5E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M-5,-40 C-12,-45 -15,-50 -12,-60" stroke="#5E8A5E" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M5,-35 C12,-40 15,-45 12,-55" stroke="#5E8A5E" stroke-width="1" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Chinese seal (stamp) decoration -->
  <g transform="translate(320,50)">
    <rect x="-22" y="-22" width="44" height="44" fill="none" stroke="#7A9A6A" stroke-width="1.5" rx="3" opacity="0.3"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="11" fill="#7A9A6A" opacity="0.4">本草</text>
  </g>

  <!-- Floating decorative dots -->
  <circle cx="50" cy="60" r="2" fill="#7A9A6A" opacity="0.08"/>
  <circle cx="350" cy="120" r="1.5" fill="#5E8A5E" opacity="0.08"/>
  <circle cx="60" cy="180" r="2.5" fill="#7A9A6A" opacity="0.06"/>
  <circle cx="340" cy="200" r="1.5" fill="#5E8A5E" opacity="0.07"/>

  <!-- Text label at bottom -->
  <text x="200" y="310" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="18" font-weight="700" fill="#3A5A3A" opacity="0.8">扁蓄</text>
  <text x="200" y="328" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#3A5A3A" opacity="0.4" font-style="italic">Polygoni Avicularis Herba</text>

  <!-- Nature/Flavor tag -->
  <text x="200" y="22" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="9" fill="#3A5A3A" opacity="0.35">微寒性 · 苦</text>
</svg>