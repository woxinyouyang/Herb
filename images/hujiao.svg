<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" width="400" height="340">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F4EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eeeae4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3A5A2A;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#3A5A2A;stop-opacity:0.02" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="340" fill="url(#bgGrad)" rx="4"/>

  <!-- Decorative border -->
  <rect x="8" y="8" width="384" height="324" fill="none" stroke="#3A5A2A" stroke-width="0.5" rx="2" opacity="0.2"/>

  <!-- Ground line -->
  <path d="M50,270 Q100,265 200,268 Q300,271 350,267" stroke="#3A5A2A" stroke-width="0.8" fill="none" opacity="0.2"/>

  <!-- Plant illustration -->
  <g transform="translate(200,260)">
    <path d="M-3,0 L-3,-50 L0,-60 L3,-50 L3,0 Z" fill="#3A5A2A" opacity="0.6"/>
    <path d="M0,-60 C-5,-65 -12,-70 -15,-80 C-10,-75 -5,-72 0,-70" fill="#6B8E4E" opacity="0.7"/>
    <path d="M0,-60 C5,-65 12,-70 15,-80 C10,-75 5,-72 0,-70" fill="#6B8E4E" opacity="0.7"/>
    <path d="M0,-65 C-8,-72 -18,-82 -20,-95 C-14,-88 -7,-82 0,-78" fill="#6B8E4E" opacity="0.6"/>
    <path d="M0,-65 C8,-72 18,-82 20,-95 C14,-88 7,-82 0,-78" fill="#6B8E4E" opacity="0.6"/>
    <path d="M0,-75 C-6,-82 -14,-92 -12,-105 C-8,-98 -4,-92 0,-88" fill="#6B8E4E" opacity="0.5"/>
    <path d="M0,-75 C6,-82 14,-92 12,-105 C8,-98 4,-92 0,-88" fill="#6B8E4E" opacity="0.5"/>
    <circle cx="0" cy="-100" r="12" fill="#6B8E4E" opacity="0.4"/>
  </g>

  <!-- Chinese seal (stamp) decoration -->
  <g transform="translate(320,50)">
    <rect x="-22" y="-22" width="44" height="44" fill="none" stroke="#8B5A3A" stroke-width="1.5" rx="3" opacity="0.3"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="11" fill="#8B5A3A" opacity="0.4">本草</text>
  </g>

  <!-- Floating decorative dots -->
  <circle cx="50" cy="60" r="2" fill="#8B5A3A" opacity="0.08"/>
  <circle cx="350" cy="120" r="1.5" fill="#6B8E4E" opacity="0.08"/>
  <circle cx="60" cy="180" r="2.5" fill="#8B5A3A" opacity="0.06"/>
  <circle cx="340" cy="200" r="1.5" fill="#6B8E4E" opacity="0.07"/>

  <!-- Text label at bottom -->
  <text x="200" y="310" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="18" font-weight="700" fill="#3A5A2A" opacity="0.8">胡椒</text>
  <text x="200" y="328" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#3A5A2A" opacity="0.4" font-style="italic">Piperis Fructus</text>

  <!-- Nature/Flavor tag -->
  <text x="200" y="22" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="9" fill="#3A5A2A" opacity="0.35">热性 · 辛</text>
</svg>