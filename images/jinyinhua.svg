<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" width="400" height="340">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F0E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F0E8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="400" height="340" fill="url(#skyGrad)"/>

  <!-- Scene background -->
  <g opacity="0.15">
      <!-- 天空渐层 -->
      <rect x="0" y="200" width="400" height="140" fill="#9A9A8A" opacity="0.3"/>
      <!-- 远山 -->
      <path d="M0,230 Q50,215 100,225 Q180,210 250,220 Q320,208 400,218 L400,340 L0,340 Z" fill="#8A8A7A" opacity="0.2"/>
      <!-- 草地 -->
      <path d="M0,250 Q100,245 200,252 Q300,246 400,250 L400,340 L0,340 Z" fill="#8A9A6A" opacity="0.3"/>
      <!-- 草丛 -->
      <path d="M20,255 Q22,245 20,240" stroke="#7A8A5A" stroke-width="1" fill="none" opacity="0.15"/><path d="M58,255 Q60,245 58,240" stroke="#7A8A5A" stroke-width="1" fill="none" opacity="0.15"/><path d="M96,255 Q98,245 96,240" stroke="#7A8A5A" stroke-width="1" fill="none" opacity="0.15"/><path d="M134,255 Q136,245 134,240" stroke="#7A8A5A" stroke-width="1" fill="none" opacity="0.15"/><path d="M172,255 Q174,245 172,240" stroke="#7A8A5A" stroke-width="1" fill="none" opacity="0.15"/><path d="M210,255 Q212,245 210,240" stroke="#7A8A5A" stroke-width="1" fill="none" opacity="0.15"/><path d="M248,255 Q250,245 248,240" stroke="#7A8A5A" stroke-width="1" fill="none" opacity="0.15"/><path d="M286,255 Q288,245 286,240" stroke="#7A8A5A" stroke-width="1" fill="none" opacity="0.15"/><path d="M324,255 Q326,245 324,240" stroke="#7A8A5A" stroke-width="1" fill="none" opacity="0.15"/><path d="M362,255 Q364,245 362,240" stroke="#7A8A5A" stroke-width="1" fill="none" opacity="0.15"/>
    </g>

  <!-- Scene extras -->
  <g opacity="0.08">
      <circle cx="80" cy="240" r="1.5" fill="#D4A030"/>
      <circle cx="250" cy="245" r="1" fill="#D4A030"/>
      <circle cx="330" cy="242" r="1.5" fill="#D4A030"/>
    </g>

  <!-- Plant (foreground) -->
  <g transform="translate(200,260)">
    <!-- 藤 -->
    <path d="M0,0 Q-10,-20 -8,-40 T-5,-80 Q-2,-100 0,-120" stroke="#5A7A3A" stroke-width="2.5" fill="none"/>
    <!-- 叶 -->
    <ellipse cx="-15" cy="-35" rx="12" ry="6" fill="#5A8A4A" opacity="0.7" transform="rotate(-30,-15,-35)"/>
    <ellipse cx="12" cy="-50" rx="12" ry="6" fill="#6A9A5A" opacity="0.7" transform="rotate(20,12,-50)"/>
    <ellipse cx="-10" cy="-85" rx="10" ry="5" fill="#5A8A4A" opacity="0.6" transform="rotate(-25,-10,-85)"/>
    <!-- 金银花（双花，一金一银） -->
    <g transform="translate(-6,-110)">
      <path d="M0,0 Q-6,-8 -5,-15 Q-3,-20 0,-18 Q3,-20 5,-15 Q6,-8 0,0 Z" fill="#F5F0E8" opacity="0.9"/>
      <path d="M0,-3 Q-4,-9 -3,-14 Q-2,-17 0,-16 Q2,-17 3,-14 Q4,-9 0,-3 Z" fill="#FFF8F0" opacity="0.7"/>
    </g>
    <g transform="translate(8,-105)">
      <path d="M0,0 Q-5,-7 -4,-13 Q-2,-17 0,-15 Q2,-17 4,-13 Q5,-7 0,0 Z" fill="#D4A030" opacity="0.85"/>
      <path d="M0,-3 Q-3,-8 -3,-12 Q-1,-14 0,-13 Q1,-14 3,-12 Q3,-8 0,-3 Z" fill="#E0B040" opacity="0.6"/>
    </g>
  </g>

  <!-- Ground cover -->
  <path d="M0,258 Q100,256 200,260 Q300,255 400,258 L400,265 L0,265 Z" fill="#6A5A3A" opacity="0.08"/>

  <!-- Chinese seal stamp -->
  <g transform="translate(330,50)">
    <rect x="-18" y="-18" width="36" height="36" fill="none" stroke="#D4A03A" stroke-width="1.2" rx="2" opacity="0.25"/>
    <text x="0" y="4" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="9" fill="#D4A03A" opacity="0.3">药</text>
  </g>

  <!-- Decorative elements -->
  <circle cx="40" cy="50" r="2" fill="#D4A03A" opacity="0.06"/>
  <circle cx="360" cy="130" r="1.5" fill="#D4A03A" opacity="0.05"/>

  <!-- Title -->
  <text x="200" y="312" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="16" font-weight="700" fill="#D4A03A" opacity="0.75">金银花</text>
  <text x="200" y="328" text-anchor="middle" font-family="Georgia,serif" font-size="7" font-style="italic" fill="#D4A03A" opacity="0.35">Lonicera japonica</text>
  <text x="200" y="20" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="8" fill="#D4A03A" opacity="0.25">金银花 · 原野</text>
</svg>