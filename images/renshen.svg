<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" width="400" height="340">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F0E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F0E8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="400" height="340" fill="url(#skyGrad)"/>

  <!-- Scene background -->
  <g opacity="0.15">
      <!-- 远山 -->
      <path d="M0,220 Q50,160 100,200 Q150,140 200,180 Q250,130 300,170 Q350,145 400,190 L400,340 L0,340 Z" fill="#6A8A6A" opacity="0.5"/>
      <path d="M20,240 Q80,190 150,220 Q200,170 280,200 Q330,160 380,195 L400,210 L400,340 L0,340 Z" fill="#5A7A5A" opacity="0.4"/>
      <!-- 雾气 -->
      <ellipse cx="100" cy="230" rx="120" ry="20" fill="white" opacity="0.08"/>
      <ellipse cx="300" cy="215" rx="100" ry="15" fill="white" opacity="0.06"/>
      <!-- 地面 -->
      <path d="M0,260 Q100,255 200,262 Q300,258 400,265 L400,340 L0,340 Z" fill="#4A3A2A" opacity="0.6"/>
    </g>

  <!-- Scene extras -->
  <g opacity="0.12">
      <!-- 树木剪影 -->
      <rect x="60" y="180" width="6" height="80" fill="#5A3A2A" rx="1"/>
      <circle cx="63" cy="175" r="25" fill="#3A5A3A" opacity="0.6"/>
      <rect x="320" y="195" width="5" height="65" fill="#5A3A2A" rx="1"/>
      <circle cx="322" cy="190" r="18" fill="#3A5A3A" opacity="0.5"/>
    </g>

  <!-- Plant (foreground) -->
  <g transform="translate(200,260)">
    <path d="M0,0 Q-5,-20 -3,-40 Q0,-60 2,-80 Q5,-100 3,-120" stroke="#4A6A3A" stroke-width="3" fill="none"/>
    <ellipse cx="0" cy="-125" rx="18" ry="12" fill="#5A8A4A" opacity="0.8"/>
    <ellipse cx="-15" cy="-110" rx="14" ry="10" fill="#5A8A4A" opacity="0.7" transform="rotate(-15,-15,-110)"/>
    <ellipse cx="15" cy="-110" rx="14" ry="10" fill="#5A8A4A" opacity="0.7" transform="rotate(15,15,-110)"/>
    <ellipse cx="-8" cy="-135" rx="10" ry="7" fill="#6A9A5A" opacity="0.6"/>
    <ellipse cx="8" cy="-135" rx="10" ry="7" fill="#6A9A5A" opacity="0.6"/>
    <!-- 人参果（红色浆果） -->
    <circle cx="-10" cy="-95" r="4" fill="#C44A2A" opacity="0.8"/>
    <circle cx="8" cy="-90" r="3.5" fill="#C44A2A" opacity="0.7"/>
    <circle cx="0" cy="-100" r="3" fill="#D45A3A" opacity="0.6"/>
    <!-- 根须（人参特征） -->
    <path d="M0,20 Q-8,30 -12,40" stroke="#B08A5A" stroke-width="1.5" fill="none"/>
    <path d="M0,20 Q8,35 10,45" stroke="#B08A5A" stroke-width="1.5" fill="none"/>
    <path d="M0,30 Q-12,45 -15,55" stroke="#B08A5A" stroke-width="1" fill="none"/>
    <path d="M0,30 Q12,50 14,58" stroke="#B08A5A" stroke-width="1" fill="none"/>
  </g>

  <!-- Ground cover -->
  <path d="M0,258 Q100,256 200,260 Q300,255 400,258 L400,265 L0,265 Z" fill="#4A3A2A" opacity="0.08"/>

  <!-- Chinese seal stamp -->
  <g transform="translate(330,50)">
    <rect x="-18" y="-18" width="36" height="36" fill="none" stroke="#C44A2A" stroke-width="1.2" rx="2" opacity="0.25"/>
    <text x="0" y="4" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="9" fill="#C44A2A" opacity="0.3">药</text>
  </g>

  <!-- Decorative elements -->
  <circle cx="40" cy="50" r="2" fill="#C44A2A" opacity="0.06"/>
  <circle cx="360" cy="130" r="1.5" fill="#C44A2A" opacity="0.05"/>

  <!-- Title -->
  <text x="200" y="312" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="16" font-weight="700" fill="#C44A2A" opacity="0.75">人参</text>
  <text x="200" y="328" text-anchor="middle" font-family="Georgia,serif" font-size="7" font-style="italic" fill="#C44A2A" opacity="0.35">Panax ginseng C. A. Mey.</text>
  <text x="200" y="20" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="8" fill="#C44A2A" opacity="0.25">人参 · 山林间</text>
</svg>