<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" width="400" height="340">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F0E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F0E8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="400" height="340" fill="url(#skyGrad)"/>

  <!-- Scene background -->
  <g opacity="0.15">
      <!-- 远山 -->
      <path d="M0,220 Q50,160 100,200 Q150,140 200,180 Q250,130 300,170 Q350,145 400,190 L400,340 L0,340 Z" fill="#7A8A7A" opacity="0.5"/>
      <path d="M20,240 Q80,190 150,220 Q200,170 280,200 Q330,160 380,195 L400,210 L400,340 L0,340 Z" fill="#6A7A6A" opacity="0.4"/>
      <!-- 雾气 -->
      <ellipse cx="100" cy="230" rx="120" ry="20" fill="white" opacity="0.08"/>
      <ellipse cx="300" cy="215" rx="100" ry="15" fill="white" opacity="0.06"/>
      <!-- 地面 -->
      <path d="M0,260 Q100,255 200,262 Q300,258 400,265 L400,340 L0,340 Z" fill="#6A5A3A" opacity="0.6"/>
    </g>

  <!-- Scene extras -->
  <g opacity="0.12">
      <!-- 树木剪影 -->
      <rect x="60" y="180" width="6" height="80" fill="#6A4A2A" rx="1"/>
      <circle cx="63" cy="175" r="25" fill="#4A5A3A" opacity="0.6"/>
      <rect x="320" y="195" width="5" height="65" fill="#6A4A2A" rx="1"/>
      <circle cx="322" cy="190" r="18" fill="#4A5A3A" opacity="0.5"/>
    </g>

  <!-- Plant (foreground) -->
  <g transform="translate(200,260)">
    <!-- 虫体 -->
    <ellipse cx="0" cy="10" rx="6" ry="20" fill="#8A7A4A" opacity="0.8"/>
    <ellipse cx="0" cy="10" rx="5" ry="18" fill="#A0905A" opacity="0.6"/>
    <!-- 草体（子座） -->
    <path d="M0,-10 Q3,-30 2,-50 Q1,-70 3,-90 Q5,-110 2,-130" stroke="#4A6A3A" stroke-width="2.5" fill="none"/>
    <path d="M2,-130 Q0,-135 4,-138 Q8,-140 6,-135" stroke="#5A7A4A" stroke-width="1.5" fill="none"/>
    <!-- 头部（子囊壳） -->
    <ellipse cx="3" cy="-132" rx="4" ry="8" fill="#5A7A4A" opacity="0.6" transform="rotate(10,3,-132)"/>
    <!-- 虫足 -->
    <path d="M-4,-5 L-10,-3 M-4,5 L-10,7 M-4,15 L-10,17" stroke="#8A7A4A" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M4,-5 L10,-3 M4,5 L10,7 M4,15 L10,17" stroke="#8A7A4A" stroke-width="1" fill="none" opacity="0.6"/>
  </g>

  <!-- Ground cover -->
  <path d="M0,258 Q100,256 200,260 Q300,255 400,258 L400,265 L0,265 Z" fill="#6A5A3A" opacity="0.08"/>

  <!-- Chinese seal stamp -->
  <g transform="translate(330,50)">
    <rect x="-18" y="-18" width="36" height="36" fill="none" stroke="#8A7A4A" stroke-width="1.2" rx="2" opacity="0.25"/>
    <text x="0" y="4" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="9" fill="#8A7A4A" opacity="0.3">药</text>
  </g>

  <!-- Decorative elements -->
  <circle cx="40" cy="50" r="2" fill="#8A7A4A" opacity="0.06"/>
  <circle cx="360" cy="130" r="1.5" fill="#8A7A4A" opacity="0.05"/>

  <!-- Title -->
  <text x="200" y="312" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="16" font-weight="700" fill="#8A7A4A" opacity="0.75">冬虫夏草</text>
  <text x="200" y="328" text-anchor="middle" font-family="Georgia,serif" font-size="7" font-style="italic" fill="#8A7A4A" opacity="0.35">Cordyceps sinensis (Berk.) Sacc.</text>
  <text x="200" y="20" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="8" fill="#8A7A4A" opacity="0.25">冬虫夏草 · 雪域</text>
</svg>