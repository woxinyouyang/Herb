<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" width="400" height="340">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5eeeb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A3A5A;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#4A3A5A;stop-opacity:0.02" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="340" fill="url(#bgGrad)" rx="4"/>

  <!-- Decorative border -->
  <rect x="8" y="8" width="384" height="324" fill="none" stroke="#4A3A5A" stroke-width="0.5" rx="2" opacity="0.2"/>

  <!-- Ground line -->
  <path d="M50,270 Q100,265 200,268 Q300,271 350,267" stroke="#4A3A5A" stroke-width="0.8" fill="none" opacity="0.2"/>

  <!-- Plant illustration -->
  <g transform="translate(200,260)">
    <path d="M0,0 L0,-60" stroke="#5A7A4A" stroke-width="3" fill="none"/>
    <ellipse cx="0" cy="-70" rx="25" ry="22" fill="#C47A5A" opacity="0.7"/>
    <ellipse cx="-18" cy="-55" rx="18" ry="14" fill="#C47A5A" opacity="0.6" transform="rotate(-30,-18,-55)"/>
    <ellipse cx="18" cy="-55" rx="18" ry="14" fill="#C47A5A" opacity="0.6" transform="rotate(30,18,-55)"/>
    <ellipse cx="-12" cy="-82" rx="14" ry="10" fill="#C47A5A" opacity="0.5" transform="rotate(-15,-12,-82)"/>
    <ellipse cx="12" cy="-82" rx="14" ry="10" fill="#C47A5A" opacity="0.5" transform="rotate(15,12,-82)"/>
    <circle cx="0" cy="-70" r="8" fill="#F5E8C8" opacity="0.9"/>
    <circle cx="0" cy="-70" r="3" fill="#D4A574"/>
    <ellipse cx="-8" cy="-40" rx="12" ry="6" fill="#6A8A5A" opacity="0.7" transform="rotate(-30,-8,-40)"/>
    <ellipse cx="8" cy="-40" rx="12" ry="6" fill="#6A8A5A" opacity="0.7" transform="rotate(30,8,-40)"/>
  </g>

  <!-- Chinese seal (stamp) decoration -->
  <g transform="translate(320,50)">
    <rect x="-22" y="-22" width="44" height="44" fill="none" stroke="#C47A5A" stroke-width="1.5" rx="3" opacity="0.3"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="11" fill="#C47A5A" opacity="0.4">本草</text>
  </g>

  <!-- Floating decorative dots -->
  <circle cx="50" cy="60" r="2" fill="#C47A5A" opacity="0.08"/>
  <circle cx="350" cy="120" r="1.5" fill="#6A8A5A" opacity="0.08"/>
  <circle cx="60" cy="180" r="2.5" fill="#C47A5A" opacity="0.06"/>
  <circle cx="340" cy="200" r="1.5" fill="#6A8A5A" opacity="0.07"/>

  <!-- Text label at bottom -->
  <text x="200" y="310" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="18" font-weight="700" fill="#4A3A5A" opacity="0.8">花蕊石</text>
  <text x="200" y="328" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#4A3A5A" opacity="0.4" font-style="italic">Ophicalcitum</text>

  <!-- Nature/Flavor tag -->
  <text x="200" y="22" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="9" fill="#4A3A5A" opacity="0.35">平性 · 酸、涩</text>
</svg>