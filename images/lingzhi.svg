<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" width="400" height="340">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F0E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F0E8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="400" height="340" fill="url(#skyGrad)"/>

  <!-- Scene background -->
  <g opacity="0.15">
      <!-- 远山 -->
      <path d="M0,220 Q50,160 100,200 Q150,140 200,180 Q250,130 300,170 Q350,145 400,190 L400,340 L0,340 Z" fill="#6A7A5A" opacity="0.5"/>
      <path d="M20,240 Q80,190 150,220 Q200,170 280,200 Q330,160 380,195 L400,210 L400,340 L0,340 Z" fill="#5A6A4A" opacity="0.4"/>
      <!-- 雾气 -->
      <ellipse cx="100" cy="230" rx="120" ry="20" fill="white" opacity="0.08"/>
      <ellipse cx="300" cy="215" rx="100" ry="15" fill="white" opacity="0.06"/>
      <!-- 地面 -->
      <path d="M0,260 Q100,255 200,262 Q300,258 400,265 L400,340 L0,340 Z" fill="#5A3A2A" opacity="0.6"/>
    </g>

  <!-- Scene extras -->
  <g opacity="0.12">
      <!-- 树木剪影 -->
      <rect x="60" y="180" width="6" height="80" fill="#5A3A1A" rx="1"/>
      <circle cx="63" cy="175" r="25" fill="#3A5A3A" opacity="0.6"/>
      <rect x="320" y="195" width="5" height="65" fill="#5A3A1A" rx="1"/>
      <circle cx="322" cy="190" r="18" fill="#3A5A3A" opacity="0.5"/>
    </g>

  <!-- Plant (foreground) -->
  <g transform="translate(200,260)">
    <path d="M0,0 Q-5,-15 -3,-30" stroke="#8A6A4A" stroke-width="4" fill="none"/>
    <!-- 灵芝菌盖（肾形） -->
    <path d="M-3,-35 Q-40,-50 -35,-70 Q-30,-85 -3,-80 Q10,-85 25,-75 Q40,-65 35,-50 Q30,-38 -3,-35 Z" fill="#A04030" opacity="0.85"/>
    <path d="M-3,-38 Q-35,-52 -32,-68 Q-28,-80 -3,-76 Q8,-80 22,-72 Q35,-62 32,-50 Q28,-40 -3,-38 Z" fill="#B05040" opacity="0.6"/>
    <!-- 灵芝纹理 -->
    <path d="M-3,-45 Q-15,-50 -20,-58" stroke="#8A3020" stroke-width="0.8" fill="none" opacity="0.5"/>
    <path d="M-3,-55 Q-12,-58 -15,-65" stroke="#8A3020" stroke-width="0.8" fill="none" opacity="0.4"/>
    <path d="M-3,-50 Q10,-55 15,-60" stroke="#8A3020" stroke-width="0.8" fill="none" opacity="0.4"/>
    <!-- 边缘淡色 -->
    <path d="M-35,-70 Q-30,-85 -3,-80 Q10,-85 25,-75 Q40,-65 35,-50" stroke="#D4A080" stroke-width="1" fill="none" opacity="0.4"/>
  </g>

  <!-- Ground cover -->
  <path d="M0,258 Q100,256 200,260 Q300,255 400,258 L400,265 L0,265 Z" fill="#5A3A2A" opacity="0.08"/>

  <!-- Chinese seal stamp -->
  <g transform="translate(330,50)">
    <rect x="-18" y="-18" width="36" height="36" fill="none" stroke="#A04030" stroke-width="1.2" rx="2" opacity="0.25"/>
    <text x="0" y="4" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="9" fill="#A04030" opacity="0.3">药</text>
  </g>

  <!-- Decorative elements -->
  <circle cx="40" cy="50" r="2" fill="#A04030" opacity="0.06"/>
  <circle cx="360" cy="130" r="1.5" fill="#A04030" opacity="0.05"/>

  <!-- Title -->
  <text x="200" y="312" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="16" font-weight="700" fill="#A04030" opacity="0.75">灵芝</text>
  <text x="200" y="328" text-anchor="middle" font-family="Georgia,serif" font-size="7" font-style="italic" fill="#A04030" opacity="0.35">Ganoderma lucidum</text>
  <text x="200" y="20" text-anchor="middle" font-family="'Noto Serif SC','SimSun',serif" font-size="8" fill="#A04030" opacity="0.25">灵芝 · 山林</text>
</svg>